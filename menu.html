<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Menu and reservations for The Cozy Bean Cafe">
    <title>Our Menu - The Cozy Bean Cafe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>The Cozy Bean Cafe</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Our Menu</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="menu-section">
            <h2>Coffee & Drinks</h2>
            <ul class="menu-list">
                <li><span class="item-name">Espresso</span> <span class="item-price">$3.00</span></li>
                <li><span class="item-name">Cappuccino</span> <span class="item-price">$4.50</span></li>
                <li><span class="item-name">Iced Latte</span> <span class="item-price">$5.00</span></li>
                <li><span class="item-name">Americano</span> <span class="item-price">$3.50</span></li>
                <li><span class="item-name">Mocha</span> <span class="item-price">$5.00</span></li>
            </ul>
        </section>

        <section class="reservation-section">
            <h2>Make a Reservation</h2>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="date">Date:</label>
                    <input type="date" id="date" name="date" required>
                </div>

                <div class="form-group">
                    <label for="time">Time:</label>
                    <input type="time" id="time" name="time" required>
                </div>

                <div class="form-group">
                    <label for="guests">Number of Guests:</label>
                    <input type="number" id="guests" name="guests" min="1" max="10" value="2">
                </div>

                <div class="form-group">
                    <label for="request">Special Requests:</label>
                    <textarea id="request" name="request" rows="4"></textarea>
                </div>

                <button type="submit" class="submit-btn">Book Table</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 The Cozy Bean Cafe</p>
    </footer>
</body>
</html>
